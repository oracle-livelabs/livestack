<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Order Confirmation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Georgia:ital@0;1&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="confirmation-page">
    <div class="redwood-stripe" aria-hidden="true">
        <span class="stripe-segment s1"></span>
        <span class="stripe-segment s2"></span>
        <span class="stripe-segment s3"></span>
        <span class="stripe-segment s4"></span>
        <span class="stripe-segment s5"></span>
    </div>

    <main class="confirmation-layout">
        <div class="confirmation-shell">
            <h1>Thanks for buying from us!</h1>
            <p class="lead">Your order is already on its way.</p>

            {% if products %}
            <h3>Items Ordered</h3>
            <ul class="list-group">
                {% for product in products %}
                <li class="list-group-item">{{ product }}</li>
                {% endfor %}
            </ul>
            {% endif %}

            <div class="confirmation-actions">
                <a href="/" class="btn primary-redwood-btn">Return to Store</a>
                <form method="POST" action="/clear_cache">
                    <button type="submit" class="btn secondary-redwood-btn">Clear Cache</button>
                </form>
            </div>
        </div>
    </main>

    <div class="bottom-brand-dock">
        <div class="xray-toggle-wrap xray-brand-control">
            <span class="xray-toggle-label">Database X-Ray</span>
            <label class="xray-switch">
                <input id="xrayToggle" type="checkbox" onchange="toggleXrayMode(this.checked)">
                <span class="xray-slider"></span>
            </label>
        </div>
        <a class="oracle-logo-badge" href="https://www.oracle.com/" target="_blank" rel="noopener noreferrer" aria-label="Oracle">
            <img class="oracle-logo-mark" src="{{ url_for('static', filename='images/oracle-logo.png') }}" alt="Oracle logo">
        </a>
    </div>

    <div id="xrayPopup" class="xray-panel xray-popup" style="display: none;"></div>

    <script>
        const XRAY_STORAGE_KEY = "simidemo.xrayMode";

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function renderConfirmationXrayPanel() {
            return `
                <h4>Storefront: Oracle AI Database X-Ray</h4>
                <p class="xray-caption">The checkout confirmation screen is idle. Return to the storefront to inspect live Oracle AI Database activity.</p>
                <div class="xray-item">
                    <strong>Status</strong>
                    No database request is running on this page.
                </div>
                <div class="xray-item">
                    <strong>Next Step</strong>
                    Head back to the store, run a search, or open a product insight modal to trace vector search and semantic-cache lookups.
                </div>
                <div class="xray-item">
                    <strong>Oracle AI Database Operation</strong>
                    <div class="xray-code">POST / for vector search or POST /get_product_info for semantic-cache lookup.</div>
                </div>
            `;
        }

        function toggleXrayMode(enabled) {
            const xrayEnabled = !!enabled;
            localStorage.setItem(XRAY_STORAGE_KEY, xrayEnabled ? "true" : "false");

            const toggle = document.getElementById("xrayToggle");
            if (toggle) {
                toggle.checked = xrayEnabled;
            }

            const panel = document.getElementById("xrayPopup");
            if (!panel) {
                return;
            }

            if (!xrayEnabled) {
                panel.style.display = "none";
                return;
            }

            panel.style.display = "block";
            panel.innerHTML = renderConfirmationXrayPanel();
        }

        document.addEventListener("DOMContentLoaded", () => {
            const enabled = localStorage.getItem(XRAY_STORAGE_KEY) === "true";
            toggleXrayMode(enabled);
        });
    </script>
</body>

</html>
